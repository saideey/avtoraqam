events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream autoraqam_backend {
        server autoraqam_backend:8001;
    }

    upstream autoraqam_frontend {
        server autoraqam_frontend:80;
    }

    server {
        listen 80;

        # API so'rovlari → Flask
        location /api/ {
            proxy_pass http://autoraqam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }

        # Swagger static fayllari va spec
        location /flasgger_static/ {
            proxy_pass http://autoraqam_backend;
            proxy_set_header Host $host;
        }

        location /apispec.json {
            proxy_pass http://autoraqam_backend;
            proxy_set_header Host $host;
        }

        location /apidocs {
            proxy_pass http://autoraqam_backend;
            proxy_set_header Host $host;
        }

        # WebSocket (SocketIO)
        location /socket.io/ {
            proxy_pass http://autoraqam_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Statik fayllar (yuklangan rasmlar)
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Frontend → React
        location / {
            proxy_pass http://autoraqam_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
